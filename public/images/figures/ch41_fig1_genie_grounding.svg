<svg xmlns="http://www.w3.org/2000/svg" width="800" height="560" viewBox="0 0 800 560" style="font-family:Inter,Helvetica,Arial,sans-serif;background:transparent"><defs><marker id="a41g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#444444" /></marker><marker id="a41o" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#EF9F27" /></marker></defs><text x="400" y="32" font-family="Inter,Helvetica,Arial,sans-serif" font-size="18" font-weight="700" fill="#111111" text-anchor="middle" dominant-baseline="central">Figure 41.1: How Genie Answers a Question</text><text x="400" y="60" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#444444" text-anchor="middle" dominant-baseline="central">Genie reads four grounding stores before writing SQL. Answer quality depends on what lives in each.</text><rect x="80" y="100" width="240" height="50" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1.5"/><text x="200" y="124" font-family="Inter,Helvetica,Arial,sans-serif" font-size="14" font-weight="700" fill="#0C447C" text-anchor="middle" dominant-baseline="central">User question</text><text x="200" y="142" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#444444" text-anchor="middle" dominant-baseline="central">plain English</text><line x1="200" y1="150" x2="200" y2="184" stroke="#444444" stroke-width="2.5" marker-end="url(#a41g)" /><rect x="80" y="188" width="240" height="76" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1.5"/><text x="200" y="214" font-family="Inter,Helvetica,Arial,sans-serif" font-size="15" font-weight="700" fill="#633806" text-anchor="middle" dominant-baseline="central">Genie runtime</text><text x="200" y="236" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#444444" text-anchor="middle" dominant-baseline="central">reads grounding,</text><text x="200" y="254" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#444444" text-anchor="middle" dominant-baseline="central">writes SQL</text><line x1="200" y1="264" x2="200" y2="298" stroke="#444444" stroke-width="2.5" marker-end="url(#a41g)" /><rect x="80" y="302" width="240" height="50" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.5"/><text x="200" y="326" font-family="Inter,Helvetica,Arial,sans-serif" font-size="14" font-weight="700" fill="#3C3489" text-anchor="middle" dominant-baseline="central">Generated SQL</text><text x="200" y="344" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#444444" text-anchor="middle" dominant-baseline="central">runs on a warehouse</text><line x1="200" y1="352" x2="200" y2="386" stroke="#444444" stroke-width="2.5" marker-end="url(#a41g)" /><rect x="80" y="390" width="240" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/><text x="200" y="414" font-family="Inter,Helvetica,Arial,sans-serif" font-size="14" font-weight="700" fill="#085041" text-anchor="middle" dominant-baseline="central">Answer with citations</text><text x="200" y="432" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#444444" text-anchor="middle" dominant-baseline="central">table + chart + sources</text><text x="585" y="116" font-family="Inter,Helvetica,Arial,sans-serif" font-size="14" font-weight="700" fill="#1A1A1A" text-anchor="middle" dominant-baseline="central">Four grounding stores</text><text x="585" y="134" font-family="Inter,Helvetica,Arial,sans-serif" font-size="11" font-weight="400" fill="#666666" text-anchor="middle" dominant-baseline="central">(read in parallel)</text><rect x="420" y="150" width="160" height="72" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.5"/><text x="500" y="178" font-family="Inter,Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#3C3489" text-anchor="middle" dominant-baseline="central">UC table metadata</text><text x="500" y="200" font-family="Inter,Helvetica,Arial,sans-serif" font-size="11" font-weight="400" fill="#444444" text-anchor="middle" dominant-baseline="central">schema, types, keys</text><rect x="590" y="150" width="160" height="72" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/><text x="670" y="178" font-family="Inter,Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#085041" text-anchor="middle" dominant-baseline="central">Certified metrics</text><text x="670" y="200" font-family="Inter,Helvetica,Arial,sans-serif" font-size="11" font-weight="400" fill="#444444" text-anchor="middle" dominant-baseline="central">revenue, churn, LTV</text><rect x="420" y="240" width="160" height="72" rx="8" fill="#FFF5E1" stroke="#EF9F27" stroke-width="1.5"/><text x="500" y="268" font-family="Inter,Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#633806" text-anchor="middle" dominant-baseline="central">Knowledge store</text><text x="500" y="290" font-family="Inter,Helvetica,Arial,sans-serif" font-size="11" font-weight="400" fill="#444444" text-anchor="middle" dominant-baseline="central">team vocabulary</text><rect x="590" y="240" width="160" height="72" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1.5"/><text x="670" y="268" font-family="Inter,Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#0C447C" text-anchor="middle" dominant-baseline="central">Sample questions</text><text x="670" y="290" font-family="Inter,Helvetica,Arial,sans-serif" font-size="11" font-weight="400" fill="#444444" text-anchor="middle" dominant-baseline="central">approved Q + SQL</text><line x1="420" y1="226" x2="324" y2="226" stroke="#EF9F27" stroke-width="3" marker-end="url(#a41o)" /><text x="372" y="217" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#633806" text-anchor="middle" dominant-baseline="central">reads all four</text><rect x="50" y="480" width="700" height="64" rx="10" fill="#F5F4F0" stroke="#D4D4D4" stroke-width="1.5"/><text x="400" y="502" font-family="Inter,Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#1A1A1A" text-anchor="middle" dominant-baseline="central">Answer quality depends on what lives in each store</text><text x="400" y="524" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#333333" text-anchor="middle" dominant-baseline="central">Empty knowledge store gives bland answers. Missing metric definitions give wrong numbers.</text></svg>