<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520" style="font-family:Inter,Helvetica,Arial,sans-serif;background:transparent">
<text x="400" y="30" font-family="Inter,Helvetica,Arial,sans-serif" font-size="18" font-weight="700" fill="#111111" text-anchor="middle" dominant-baseline="central">Figure 52.2: Multi-Agent Evaluation Flow</text>
<text x="400" y="58" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#444444" text-anchor="middle" dominant-baseline="central">Eval a Supervisor by judging its full trace, not just the final answer.</text>
<rect x="30" y="110" width="120" height="80" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="1.5"/>
<text x="90" y="138" font-family="Inter,Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#0C447C" text-anchor="middle" dominant-baseline="central">Synthetic turns</text>
<text x="90" y="160" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#333333" text-anchor="middle" dominant-baseline="central">realistic inputs</text>
<rect x="190" y="110" width="120" height="80" rx="10" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.5"/>
<text x="250" y="138" font-family="Inter,Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#3C3489" text-anchor="middle" dominant-baseline="central">Run Supervisor</text>
<text x="250" y="160" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#333333" text-anchor="middle" dominant-baseline="central">capture traces</text>
<rect x="350" y="110" width="120" height="80" rx="10" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1.5"/>
<text x="410" y="138" font-family="Inter,Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#633806" text-anchor="middle" dominant-baseline="central">Judge each turn</text>
<text x="410" y="160" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#333333" text-anchor="middle" dominant-baseline="central">LLM-as-judge</text>
<rect x="510" y="110" width="120" height="80" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
<text x="570" y="138" font-family="Inter,Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#085041" text-anchor="middle" dominant-baseline="central">Aggregate metrics</text>
<text x="570" y="160" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#333333" text-anchor="middle" dominant-baseline="central">per-step + e2e</text>
<rect x="670" y="110" width="120" height="80" rx="10" fill="#FDE8E8" stroke="#B22222" stroke-width="1.5"/>
<text x="730" y="138" font-family="Inter,Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#8B0000" text-anchor="middle" dominant-baseline="central">Regression gate</text>
<text x="730" y="160" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#333333" text-anchor="middle" dominant-baseline="central">vs. baseline</text>
<line x1="153" y1="150" x2="185" y2="150" stroke="#666666" stroke-width="2" marker-end="url(#a52e)" />
<line x1="313" y1="150" x2="345" y2="150" stroke="#666666" stroke-width="2" marker-end="url(#a52e)" />
<line x1="473" y1="150" x2="505" y2="150" stroke="#666666" stroke-width="2" marker-end="url(#a52e)" />
<line x1="633" y1="150" x2="665" y2="150" stroke="#666666" stroke-width="2" marker-end="url(#a52e)" />
<rect x="30" y="210" width="120" height="70" rx="6" fill="#F9F9F8" stroke="#D4D4D4" stroke-width="1.5"/>
<text x="90" y="234" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#333333" text-anchor="middle" dominant-baseline="central">seeded from topic</text>
<text x="90" y="254" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#333333" text-anchor="middle" dominant-baseline="central">templates.</text>
<rect x="190" y="210" width="120" height="70" rx="6" fill="#F9F9F8" stroke="#D4D4D4" stroke-width="1.5"/>
<text x="250" y="234" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#333333" text-anchor="middle" dominant-baseline="central">every turn and</text>
<text x="250" y="254" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#333333" text-anchor="middle" dominant-baseline="central">child call traced.</text>
<rect x="350" y="210" width="120" height="70" rx="6" fill="#F9F9F8" stroke="#D4D4D4" stroke-width="1.5"/>
<text x="410" y="234" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#333333" text-anchor="middle" dominant-baseline="central">did Supervisor</text>
<text x="410" y="254" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#333333" text-anchor="middle" dominant-baseline="central">route correctly?</text>
<rect x="510" y="210" width="120" height="70" rx="6" fill="#F9F9F8" stroke="#D4D4D4" stroke-width="1.5"/>
<text x="570" y="234" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#333333" text-anchor="middle" dominant-baseline="central">routing + answer</text>
<text x="570" y="254" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#333333" text-anchor="middle" dominant-baseline="central">correctness.</text>
<rect x="670" y="210" width="120" height="70" rx="6" fill="#F9F9F8" stroke="#D4D4D4" stroke-width="1.5"/>
<text x="730" y="234" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#333333" text-anchor="middle" dominant-baseline="central">block promotion</text>
<text x="730" y="254" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#333333" text-anchor="middle" dominant-baseline="central">on regression.</text>
<rect x="30" y="310" width="740" height="110" rx="10" fill="#F5F4F0" stroke="#D4D4D4" stroke-width="1.5"/>
<text x="400" y="336" font-family="Inter,Helvetica,Arial,sans-serif" font-size="14" font-weight="700" fill="#1A1A1A" text-anchor="middle" dominant-baseline="central">What the judge actually scores</text>
<text x="160" y="360" font-family="Inter,Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#3C3489" text-anchor="middle" dominant-baseline="central">Route quality</text>
<text x="160" y="378" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#333333" text-anchor="middle" dominant-baseline="central">Right child picked?</text>
<text x="160" y="396" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#444444" text-anchor="middle" dominant-baseline="central">per-turn binary score</text>
<text x="400" y="360" font-family="Inter,Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#3C3489" text-anchor="middle" dominant-baseline="central">Step correctness</text>
<text x="400" y="378" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#333333" text-anchor="middle" dominant-baseline="central">Each output valid?</text>
<text x="400" y="396" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#444444" text-anchor="middle" dominant-baseline="central">per-turn binary score</text>
<text x="640" y="360" font-family="Inter,Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#3C3489" text-anchor="middle" dominant-baseline="central">Final answer</text>
<text x="640" y="378" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#333333" text-anchor="middle" dominant-baseline="central">User satisfied?</text>
<text x="640" y="396" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#444444" text-anchor="middle" dominant-baseline="central">per-turn binary score</text>
<path d="M 730 190 Q 400 460 60 190" stroke="#1D9E75" stroke-width="2" stroke-dasharray="5 3" fill="none" marker-end="url(#a52e)" />
<text x="400" y="470" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="600" fill="#085041" text-anchor="middle" dominant-baseline="central">metrics tune the Supervisor prompt and child descriptions</text>
<defs><marker id="a52e" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#666666" /></marker></defs>
</svg>