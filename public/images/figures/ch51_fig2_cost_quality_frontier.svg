<svg xmlns="http://www.w3.org/2000/svg" width="800" height="540" viewBox="0 0 800 540" style="font-family:Inter,Helvetica,Arial,sans-serif;background:transparent">
<text x="400" y="32" font-family="Inter,Helvetica,Arial,sans-serif" font-size="18" font-weight="700" fill="#111111" text-anchor="middle" dominant-baseline="central">Figure 51.2: The Cost-Quality Frontier</text>
<text x="400" y="60" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#444444" text-anchor="middle" dominant-baseline="central">Three configurations Agent Bricks typically picks. Choose the operating point your business can tolerate.</text>
<rect x="40" y="88" width="230" height="250" rx="12" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
<text x="155" y="118" font-family="Inter,Helvetica,Arial,sans-serif" font-size="18" font-weight="700" fill="#085041" text-anchor="middle" dominant-baseline="central">Cost-sensitive</text>
<text x="155" y="154" font-family="Inter,Helvetica,Arial,sans-serif" font-size="11" font-weight="600" fill="#555555" text-anchor="middle" dominant-baseline="central">QUALITY</text>
<text x="155" y="190" font-family="Inter,Helvetica,Arial,sans-serif" font-size="32" font-weight="700" fill="#085041" text-anchor="middle" dominant-baseline="central">78%</text>
<text x="155" y="226" font-family="Inter,Helvetica,Arial,sans-serif" font-size="11" font-weight="600" fill="#555555" text-anchor="middle" dominant-baseline="central">RELATIVE COST</text>
<text x="155" y="256" font-family="Inter,Helvetica,Arial,sans-serif" font-size="24" font-weight="700" fill="#1A1A1A" text-anchor="middle" dominant-baseline="central">1x</text>
<text x="155" y="286" font-family="Inter,Helvetica,Arial,sans-serif" font-size="11" font-weight="600" fill="#555555" text-anchor="middle" dominant-baseline="central">PICK WHEN</text>
<text x="155" y="306" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#333333" text-anchor="middle" dominant-baseline="central">cheapest point above</text>
<text x="155" y="324" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#333333" text-anchor="middle" dominant-baseline="central">the quality bar</text>
<rect x="285" y="88" width="230" height="250" rx="12" fill="#E6F1FB" stroke="#378ADD" stroke-width="1.5"/>
<text x="400" y="118" font-family="Inter,Helvetica,Arial,sans-serif" font-size="18" font-weight="700" fill="#0C447C" text-anchor="middle" dominant-baseline="central">Balanced</text>
<text x="400" y="154" font-family="Inter,Helvetica,Arial,sans-serif" font-size="11" font-weight="600" fill="#555555" text-anchor="middle" dominant-baseline="central">QUALITY</text>
<text x="400" y="190" font-family="Inter,Helvetica,Arial,sans-serif" font-size="32" font-weight="700" fill="#0C447C" text-anchor="middle" dominant-baseline="central">90%</text>
<text x="400" y="226" font-family="Inter,Helvetica,Arial,sans-serif" font-size="11" font-weight="600" fill="#555555" text-anchor="middle" dominant-baseline="central">RELATIVE COST</text>
<text x="400" y="256" font-family="Inter,Helvetica,Arial,sans-serif" font-size="24" font-weight="700" fill="#1A1A1A" text-anchor="middle" dominant-baseline="central">4x</text>
<text x="400" y="286" font-family="Inter,Helvetica,Arial,sans-serif" font-size="11" font-weight="600" fill="#555555" text-anchor="middle" dominant-baseline="central">PICK WHEN</text>
<text x="400" y="306" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#333333" text-anchor="middle" dominant-baseline="central">the team's</text>
<text x="400" y="324" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#333333" text-anchor="middle" dominant-baseline="central">default choice</text>
<rect x="530" y="88" width="230" height="250" rx="12" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.5"/>
<text x="645" y="118" font-family="Inter,Helvetica,Arial,sans-serif" font-size="18" font-weight="700" fill="#3C3489" text-anchor="middle" dominant-baseline="central">Quality-first</text>
<text x="645" y="154" font-family="Inter,Helvetica,Arial,sans-serif" font-size="11" font-weight="600" fill="#555555" text-anchor="middle" dominant-baseline="central">QUALITY</text>
<text x="645" y="190" font-family="Inter,Helvetica,Arial,sans-serif" font-size="32" font-weight="700" fill="#3C3489" text-anchor="middle" dominant-baseline="central">94%</text>
<text x="645" y="226" font-family="Inter,Helvetica,Arial,sans-serif" font-size="11" font-weight="600" fill="#555555" text-anchor="middle" dominant-baseline="central">RELATIVE COST</text>
<text x="645" y="256" font-family="Inter,Helvetica,Arial,sans-serif" font-size="24" font-weight="700" fill="#1A1A1A" text-anchor="middle" dominant-baseline="central">9x</text>
<text x="645" y="286" font-family="Inter,Helvetica,Arial,sans-serif" font-size="11" font-weight="600" fill="#555555" text-anchor="middle" dominant-baseline="central">PICK WHEN</text>
<text x="645" y="306" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#333333" text-anchor="middle" dominant-baseline="central">the last percent</text>
<text x="645" y="324" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#333333" text-anchor="middle" dominant-baseline="central">of accuracy matters</text>
<line x1="60" y1="372" x2="740" y2="372" stroke="#888888" stroke-width="2" marker-end="url(#a51f)" />
<text x="60" y="394" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#444444" text-anchor="start" dominant-baseline="central">lower cost</text>
<text x="740" y="394" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#444444" text-anchor="end" dominant-baseline="central">higher cost</text>
<circle cx="155" cy="372" r="10" fill="#1D9E75" stroke="#FFFFFF" stroke-width="2" />
<line x1="155" y1="342" x2="155" y2="361" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.6" />
<circle cx="400" cy="372" r="10" fill="#378ADD" stroke="#FFFFFF" stroke-width="2" />
<line x1="400" y1="342" x2="400" y2="361" stroke="#378ADD" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.6" />
<circle cx="645" cy="372" r="10" fill="#7F77DD" stroke="#FFFFFF" stroke-width="2" />
<line x1="645" y1="342" x2="645" y2="361" stroke="#7F77DD" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.6" />
<rect x="40" y="432" width="720" height="78" rx="10" fill="#F5F4F0" stroke="#D4D4D4" stroke-width="1.5"/>
<text x="400" y="458" font-family="Inter,Helvetica,Arial,sans-serif" font-size="14" font-weight="700" fill="#1A1A1A" text-anchor="middle" dominant-baseline="central">How to pick the point</text>
<text x="400" y="482" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#1A1A1A" text-anchor="middle" dominant-baseline="central">Write down the quality floor your business can tolerate.</text>
<text x="400" y="500" font-family="Inter,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#1A1A1A" text-anchor="middle" dominant-baseline="central">Pick the cheapest configuration above that floor.</text>
<defs><marker id="a51f" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#888888" /></marker></defs>
</svg>